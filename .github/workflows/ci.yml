name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-linux:
    name: Test & Lint (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-musl-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --target x86_64-unknown-linux-musl -- -D warnings

      - name: cargo test (native glibc)
        run: |
          cargo build --target x86_64-unknown-linux-gnu
          KERNEX_BIN="$(pwd)/target/x86_64-unknown-linux-gnu/debug/kernex" \
            cargo test --workspace --target x86_64-unknown-linux-gnu

      - name: cargo build (musl static binary)
        run: cargo build --workspace --target x86_64-unknown-linux-musl

  test-macos:
    name: Test & Lint (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --target aarch64-apple-darwin -- -D warnings

      - name: cargo test
        run: cargo test --workspace --target aarch64-apple-darwin

  audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit
